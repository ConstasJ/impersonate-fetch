name: Release native backend packages

on:
  workflow_dispatch:
    inputs:
      license_approval:
        description: Type approved after recording Phase 1 license/shipping approval
        required: true
        type: string

permissions:
  contents: read

jobs:
  license-gate:
    name: License/shipping approval gate
    runs-on: ubuntu-latest
    steps:
      - name: Require approval
        if: ${{ inputs.license_approval != 'approved' }}
        run: |
          echo "Phase 1 native package publishing is blocked until license/shipping approval is recorded."
          exit 1

  package-native-backends:
    name: Generate scoped backend packages
    needs: license-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download matrix native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-backend-*
          path: packages/native-backend/dist/release-artifacts
          merge-multiple: true

      - name: Generate scoped backend packages
        run: >-
          pnpm --filter @impersonated-fetch/native-backend run package:generate --
          --artifacts-dir dist/release-artifacts
          --output-dir dist/native-packages/packages

      - name: Validate scoped backend packages
        run: >-
          pnpm --filter @impersonated-fetch/native-backend run package:validate --
          --artifacts-dir dist/release-artifacts
          --output-dir dist/native-packages/packages

      - name: Upload scoped backend packages
        uses: actions/upload-artifact@v4
        with:
          name: scoped-native-backend-packages
          path: packages/native-backend/dist/native-packages
          if-no-files-found: error
